<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tensile Test Calculator</title>
  <style>
    :root { --purple:#9C64A9; --black:#000; --white:#fff; --font:"Avenir LT Std 65 Medium","Avenir Next",Arial,Helvetica,sans-serif; }
    * { box-sizing:border-box; }
    html,body { margin:0; padding:0; background:var(--white); font-family:var(--font); }
    body { display:flex; justify-content:center; padding:16px; }
    .sheet { width:min(100%,760px); background:var(--black); color:var(--white); overflow:hidden; }
    .title { background:var(--purple); color:var(--white); text-align:center; font-size:clamp(24px,5vw,48px); line-height:1.15; padding:6px 12px 5px; letter-spacing:.3px; }
    .calculator-grid { display:grid; grid-template-columns:155px minmax(210px,1fr) minmax(120px,150px) minmax(150px,230px); background:var(--black); padding:8px 14px 0; align-items:stretch; }
    .cell { min-height:34px; display:flex; align-items:center; color:var(--white); background:var(--black); font-size:clamp(15px,2vw,21px); line-height:1.2; padding:3px 8px; }
    .label { justify-content:flex-end; text-align:right; }
    .unit { font-size:clamp(14px,1.7vw,18px); }
    input, output { width:100%; min-height:28px; background:var(--white); color:var(--black); border:1px solid var(--purple); font:inherit; font-size:clamp(15px,2vw,21px); padding:1px 6px; text-align:left; }
    input:focus { outline:2px solid var(--purple); outline-offset:1px; }
    output { display:flex; align-items:center; }
    .formula-box { grid-column:1; grid-row:1 / 4; align-self:center; justify-self:center; width:145px; min-height:78px; border:2px solid var(--purple); color:var(--white); text-align:center; font-size:18px; line-height:1.25; padding:8px 10px; display:flex; flex-direction:column; justify-content:center; }
    .fraction { display:inline-grid; grid-template-rows:auto auto; align-items:center; justify-items:center; line-height:1.05; margin-left:6px; }
    .fraction .top { border-bottom:1px solid currentColor; min-width:32px; padding-bottom:1px; }
    .fraction .bottom { padding-top:1px; }
    .r1 { grid-row:1; } .r2 { grid-row:2; } .r3 { grid-row:3; } .r4 { grid-row:4; } .r5 { grid-row:5; }
    .c2 { grid-column:2; } .c3 { grid-column:3; } .c4 { grid-column:4; }
    .logo-area { background:var(--black); padding:18px 0 0; min-height:150px; display:flex; align-items:flex-start; justify-content:center; }
    .logo-area img { width:100%; height:auto; display:block; }
    @media (max-width:620px) {
      body { padding:8px; }
      .calculator-grid { grid-template-columns:1fr; padding:8px; }
      .formula-box, .cell { grid-column:1 !important; grid-row:auto !important; }
      .formula-box { margin:8px 0; width:100%; }
      .cell,.label { justify-content:flex-start; text-align:left; min-height:30px; }
      .unit { margin-bottom:6px; }
    }
  </style>
</head>
<body>
  <main class="sheet" aria-label="Tensile Test Calculator">
    <div class="title">TENSILE TEST CALCULATOR</div>
    <section class="calculator-grid">
      <div class="formula-box" aria-label="Tensile Strength formula">
        <div><u>Tensile Strength</u></div>
        <div>σ = <span class="fraction"><span class="top">F</span><span class="bottom">A</span></span></div>
      </div>

      <label class="cell label c2 r1" for="force">Force (F)=</label>
      <div class="cell c3 r1"><input id="force" type="number" inputmode="decimal" step="any" value="0" aria-label="Force F"></div>
      <div class="cell unit c4 r1">Pounds</div>

      <label class="cell label c2 r2" for="length">Length=</label>
      <div class="cell c3 r2"><input id="length" type="number" inputmode="decimal" step="any" value="0" aria-label="Length"></div>
      <div class="cell unit c4 r2">Inches</div>

      <label class="cell label c2 r3" for="width">Width=</label>
      <div class="cell c3 r3"><input id="width" type="number" inputmode="decimal" step="any" value="0" aria-label="Width"></div>
      <div class="cell unit c4 r3">Inches</div>

      <div class="cell label c2 r4">Cross Sectional Area (A)</div>
      <div class="cell c3 r4"><output id="area" aria-live="polite">0.00</output></div>
      <div class="cell unit c4 r4">Inches Squared</div>

      <div class="cell label c2 r5">Tensile Strength (σ)=</div>
      <div class="cell c3 r5"><output id="strength" aria-live="polite">0.00</output></div>
      <div class="cell unit c4 r5">Pounds per Square Inch</div>
    </section>

  <script>
    const force = document.getElementById('force');
    const lengthInput = document.getElementById('length');
    const width = document.getElementById('width');
    const area = document.getElementById('area');
    const strength = document.getElementById('strength');

    function numericValue(input) {
      const value = Number(input.value);
      return Number.isFinite(value) ? value : 0;
    }

    function formatNumber(value) {
      return Number.isFinite(value) ? value.toFixed(2) : '0.00';
    }

    function calculate() {
      const d3 = numericValue(force);
      const d4 = numericValue(lengthInput);
      const d5 = numericValue(width);
      const d6 = d4 * d5;
      const d7 = d6 === 0 ? 0 : d3 / d6;
      area.value = formatNumber(d6);
      strength.value = formatNumber(d7);
    }

    [force, lengthInput, width].forEach((input) => input.addEventListener('input', calculate));
    calculate();
  </script>
