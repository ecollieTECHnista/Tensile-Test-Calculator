<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tensile Test Calculator</title>

<style>
*{
    box-sizing:border-box;
}

html{
    background:#000;
}

body{
    margin:0;
    padding:40px;
    background:#000;
    color:#fff;
    font-family:Arial, Helvetica, sans-serif;

    display:flex;
    justify-content:center;
    align-items:flex-start;

    min-height:100vh;
}

.calculator{

    background:#111;

    border:4px solid #FFD400;
    border-radius:18px;

    padding:40px;

    width:900px;
    max-width:95vw;

    box-shadow:0 0 20px rgba(0,0,0,.45);
}

.logo{
    display:block;
    margin:0 auto 30px auto;
    max-width:420px;
}

h1{
    text-align:center;
    font-size:54px;
    margin:0 0 35px;
    font-weight:700;
}

.row{
    display:grid;
    grid-template-columns:180px 1fr 80px;
    align-items:center;
    gap:15px;
    margin-bottom:20px;
}

label{
    font-size:34px;
    font-weight:bold;
}

input{
    width:100%;
    font-size:30px;
    padding:12px;
    border-radius:8px;
    border:none;
}

.output{
    background:#e8e8e8;
    color:#000;
    font-size:30px;
    padding:12px;
    border-radius:8px;
    min-height:58px;
}

.unit{
    font-size:30px;
    font-weight:bold;
}

hr{
    border:none;
    border-top:3px solid #FFD400;
    margin:35px 0;
}

.footer{
    display:flex;
    justify-content:space-between;
    font-size:28px;
    font-weight:bold;
}

.blue{
    color:#00d6e8;
}
</style>
</head>

<body>

<div class="calculator">

    <!-- Replace with your existing logo -->
    <!-- <img src="logo.png" class="logo"> -->

    <h1>TENSILE TEST CALCULATOR</h1>

    <div class="row">
        <label>Force:</label>
        <input id="force" type="number">
        <div class="unit">lbs</div>
    </div>

    <div class="row">
        <label>Length:</label>
        <input id="length" type="number">
        <div class="unit">in</div>
    </div>

    <div class="row">
        <label>Width:</label>
        <input id="width" type="number">
        <div class="unit">in</div>
    </div>

    <hr>

    <div class="row">
        <label>Cross Sectional Area:</label>
        <div class="output" id="area"></div>
        <div class="unit">in²</div>
    </div>

    <div class="row">
        <label>Tensile Strength:</label>
        <div class="output" id="psi"></div>
        <div class="unit">PSI</div>
    </div>

    <hr>

    <div class="footer">
        <div><span class="blue">Area</span> = L × W</div>
        <div><span class="blue">PSI</span> = Force / Area</div>
    </div>

</div>

<script>
// Keep your existing calculator logic here.
// Example:

const force = document.getElementById('force');
const length = document.getElementById('length');
const width = document.getElementById('width');

function calculate(){

    const f = parseFloat(force.value);
    const l = parseFloat(length.value);
    const w = parseFloat(width.value);

    if(!isNaN(f) && !isNaN(l) && !isNaN(w) && l>0 && w>0){

        const area = l*w;
        const psi = f/area;

        document.getElementById('area').textContent = area.toFixed(4);
        document.getElementById('psi').textContent = psi.toFixed(1);

    }else{

        document.getElementById('area').textContent="";
        document.getElementById('psi').textContent="";
    }
}

force.addEventListener("input",calculate);
length.addEventListener("input",calculate);
width.addEventListener("input",calculate);

</script>

</body>
</html>
